name: CI

# Coolify despliega desde main.
# GitHub Actions queda reservado para CI y validaciones.

on:
  pull_request:
  push:
    branches:
      - develop
      - release
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r api/requirements.txt ruff

      - name: Ruff
        run: ruff check . --select F,E9

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    env:
      ADMIN_API_KEY: test-admin
      FERNET_KEY: 0zU_Zc37VAWC1UreuJmrucj1e_9I-vIJz_8XESB68lw=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r api/requirements.txt

      - name: Run tests
        run: pytest tests -q

      - name: Compile Python sources
        run: python -m compileall run.py api sri_scraper tests

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile -t sky-sri-api:ci .

      - name: Build worker image
        run: docker build -f api/Dockerfile.worker -t sky-sri-worker:ci .
