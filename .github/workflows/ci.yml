name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: sky-sri-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADMIN_API_KEY: test-admin
      FERNET_KEY: 0zU_Zc37VAWC1UreuJmrucj1e_9I-vIJz_8XESB68lw=
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install click==8.3.1 rich==14.3.3 python-dotenv==1.2.2 patchright==1.48.0.post0 pytest

      - name: Run tests
        run: |
          pytest -q tests
