services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sri
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sri_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sri -d sri_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"   # exponer solo si necesitas acceso desde host

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sri:${DB_PASSWORD}@db:5432/sri_db
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FERNET_KEY: ${FERNET_KEY}
      INTERNAL_API_URL: http://api:8000
    depends_on:
      db:
        condition: service_healthy
    # Ejecutar migraciones al iniciar
    command: >
      sh -c "
        cd /app/api &&
        alembic upgrade head &&
        cd /app &&
        uvicorn api.app.main:app --host 0.0.0.0 --port 8000
      "

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sri:${DB_PASSWORD}@db:5432/sri_db
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FERNET_KEY: ${FERNET_KEY}
      INTERNAL_API_URL: http://api:8000
      TWOCAPTCHA_API_KEY: ${TWOCAPTCHA_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    # SHM compartida necesaria para Chrome en Docker
    shm_size: "2gb"

volumes:
  pgdata:
